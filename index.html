<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Sistema Solar Interactivo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <audio id="musica-fondo" loop preload="auto">
    <source src="El_horizonte_se_desvanece.mp3" type="audio/mpeg">
  </audio>

  <!-- Librería principal THREE.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Cargador de modelos GLTF/GLB -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  
  <div id="pantalla-inicio">
    <h1>SISTEMA SOLAR</h1>
    <p>Toca la pantalla para iniciar los motores y la música</p>
  </div>
  
  <div id="hud">
    <div class="panel">
      <span>Cámara: <strong id="ui-camara">Cabina</strong></span>
      <span>| Coord: <strong id="ui-coords">X:0 Y:0 Z:0</strong></span>
    </div>
    <div class="panel">
      <span>Velocidad: </span><strong id="ui-velocidad">0</strong> km/s
    </div>
    <!-- NUEVO: Panel de distancia en Años Luz -->
    <div class="panel text-muted">
      Distancia Sol: <strong id="ui-distancia-al" style="color:#64c8ff;">0.0000</strong> AL
    </div>
    <div class="panel text-muted oculto-movil">
      [C] Cámara | [ESC] Menú | Clic en Astro
    </div>
    <div class="panel" style="padding: 5px 10px; pointer-events: auto;">
      <button id="btn-opciones" style="margin: 0; padding: 5px 10px; width: auto;">⚙️ Opciones</button>
      <button id="btn-inicio" style="margin: 0 0 0 10px; padding: 5px 10px; width: auto;">🏠 Inicio</button>
    </div>
  </div>

  <div id="info-ventana" class="oculto">
    <button id="cerrar-info">✕</button>
    <img id="info-img" src="" alt="Imagen Astro">
    <h2 id="info-titulo">Nombre</h2>
    <p id="info-desc">Descripción del astro...</p>
  </div>

  <div id="controles-tactiles">
    <div id="joystick-area">
      <div id="joystick-base" class="control-azul-base">
        <div id="joystick-knob" class="control-azul-solido"></div>
      </div>
    </div>
    <div id="botones-area">
      <div id="btn-avanzar" class="btn-accion control-azul">A</div>
      <div id="btn-retroceder" class="btn-accion control-azul">B</div>
    </div>
  </div>

  <div id="menu-config" class="oculto">
    <h2>Configuración y Sistemas</h2>
    
    <!-- NUEVO: Invertir Eje Y -->
    <div class="input-group" style="justify-content: flex-start; gap: 10px; margin-bottom: 15px;">
      <input type="checkbox" id="invertir-eje-y">
      <label for="invertir-eje-y" style="cursor: pointer; color: #64c8ff; font-weight: bold;">Invertir Eje Y (Arriba/Abajo)</label>
    </div>

    <div class="input-group">
      <label>Volumen</label>
      <input type="range" id="volumen-musica" min="0" max="1" step="0.05" value="0.4">
    </div>
    <div class="input-group" style="justify-content: flex-start; gap: 10px;">
      <input type="checkbox" id="toggle-constelaciones" checked>
      <label for="toggle-constelaciones" style="cursor: pointer;">Mostrar Constelaciones</label>
    </div>
    <div class="input-group">
      <label>Sensibilidad Ratón</label>
      <input type="range" id="rango-sensibilidad" min="0.001" max="0.01" step="0.001" value="0.003">
    </div>
    <div class="input-group">
      <label>Sensibilidad Control Digital</label>
      <input type="range" id="rango-sensibilidad-joy" min="5" max="30" step="1" value="12">
    </div>
    <div class="input-group">
      <label>Aceleración Motor</label>
      <input type="range" id="rango-velocidad" min="0.05" max="0.5" step="0.05" value="0.15">
    </div>
    <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
    <h3 style="margin-top: 0; font-size: 16px;">Piloto Automático (Tour)</h3>
    <label style="font-size: 14px; cursor: pointer;">
      <input type="checkbox" id="tour-activar"> Activar Visita Automática
    </label>
    <div id="lista-tour"></div>
    <button id="btn-cerrar" style="margin-top: 15px;">Aplicar y Volver</button>
  </div>
  
  <script src="./script.js"></script>
</body>
</html>
