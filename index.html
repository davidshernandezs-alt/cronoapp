<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factura Dra. Rosadelca</title>
    <style>
        /* ================================================== */
        /* PANEL DE CONTROL (NO SE IMPRIME) */
        /* ================================================== */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f5; padding: 20px; color: #333; margin: 0; }
        .ui-container { max-width: 900px; margin: 0 auto 30px; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #0056b3; }
        .ui-title { color: #0056b3; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Botones */
        .botones-container { display: flex; gap: 10px; margin-top: 20px; }
        .btn-print { background: #28a745; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-print:hover { background: #218838; }
        .btn-save { background: #17a2b8; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-save:hover { background: #138496; }
        .btn-add-patient { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-add-patient:hover { background: #0056b3; }
        
        .alert-box { background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        .upload-btn { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* ================================================== */
        /* ÁREA DE LA FACTURA (TAMAÑO CARTA EXACTO) */
        /* ================================================== */
        .hoja-factura {
            width: 8.5in; 
            height: 11in; 
            margin: 0 auto;
            position: relative;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            overflow: hidden;
            font-family: Arial, sans-serif; 
            font-size: 10.5pt;
            color: #333;
        }

        .imagen-fondo-real {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            pointer-events: none; 
        }

        /* ================================================== */
        /* COORDENADAS EXACTAS Y PROTECCIÓN */
        /* ================================================== */
        .texto-flotante {
            position: absolute; 
            font-weight: bold; 
            color: #4f6486; 
            z-index: 10;
            white-space: nowrap; 
        }

        /* Datos del Encabezado */
        #pos-paciente      { top: 250px; left: 240px; }
        #pos-ci            { top: 250px; left: 520px; } 
        #pos-edad          { top: 250px; left: 660px; } 

        #pos-diagnostico   { top: 290px; left: 240px; font-weight: normal; }
        #pos-procedimiento { top: 312px; left: 240px; }

        /* Fila 1: Admisión y Evaluación */
        #pos-cant-1   { top: 372px; left: 450px; text-align: center; width: 40px; }
        #pos-precio-1 { top: 372px; left: 490px; text-align: right; width: 90px; } 
        #pos-monto-1  { top: 372px; left: 650px; text-align: left; width: 150px; } 

        /* Fila 2: Consumos y Servicios (LETRA ROJA) */
        #pos-cant-2   { top: 412px; left: 450px; text-align: center; width: 40px;}
        #pos-precio-2 { top: 412px; left: 490px; text-align: right; width: 90px; } 
        #pos-monto-2  { top: 412px; left: 650px; text-align: left; width: 150px; } 

        /* Totales y Fecha */
        #pos-subtotal { top: 567px; left: 650px; text-align: left; width: 150px; font-size: 11pt; } 
        #pos-total    { top: 625px; left: 650px; text-align: left; width: 150px; font-size: 11pt; } 
        
        #pos-fecha    { top: 710px; left: 700px; text-align: left; width: 150px; font-size: 10pt; } 

        @media print {
            body { background: transparent; padding: 0; margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .ui-container { display: none !important; }
            .hoja-factura { border: none; box-shadow: none; margin: 0; page-break-after: always; }
            @page { size: letter; margin: 0; }
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <h2 class="ui-title">⚙️ Generador Definitivo - Control Total (Dra. Rosadelca)</h2>
        
        <div class="alert-box">
            <strong>¿No ves el fondo de la factura?</strong><br>
            Haz clic en el botón de abajo y selecciona tu archivo <b>fondo_4.jpg</b> desde tu computadora. Así garantizamos que SIEMPRE se vea, sin importar dónde guardes el archivo.
            <br>
            <input type="file" id="imageLoader" accept="image/*" style="display:none;">
            <button class="upload-btn" onclick="document.getElementById('imageLoader').click();">🖼️ Cargar Imagen de Fondo Manualmente</button>
        </div>
        
        <div class="form-grid">
            <div class="form-group"><label>Tasa BCV (Bs.):</label><input type="number" id="ui-tasa" value="45.50" step="0.01" oninput="sincronizarTextos()"></div>
            <div class="form-group"><label>Fecha Emisión:</label><input type="text" id="ui-fecha" value="08/07/2026" oninput="sincronizarTextos()"></div>
        </div>

        <!-- ============================================== -->
        <!-- NUEVO MÓDULO DE PACIENTES GUARDADOS -->
        <!-- ============================================== -->
        <div class="form-grid" style="grid-template-columns: 1fr; margin-bottom: 5px;">
            <div class="form-group" style="background: #e9ecef; padding: 15px; border-radius: 6px;">
                <label style="color: #0056b3; font-size: 14px;">👥 Cargar Paciente Frecuente:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="ui-select-paciente" onchange="seleccionarPaciente()">
                        <option value="">-- Escribir nuevo o seleccionar paciente --</option>
                    </select>
                    <button class="btn-add-patient" onclick="guardarNuevoPaciente()">➕ Guardar Actual en Lista</button>
                </div>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group"><label>Nombre del Paciente:</label><input type="text" id="ui-paciente" value="Daniel Francisco Aceituno" oninput="sincronizarTextos()"></div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="width: 60%;"><label>Cédula:</label><input type="text" id="ui-ci" value="C.I 6866036" oninput="sincronizarTextos()"></div>
                <div style="width: 40%;"><label>Edad:</label><input type="text" id="ui-edad" value="60 años" oninput="sincronizarTextos()"></div>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group"><label>Diagnóstico:</label><input type="text" id="ui-diagnostico" value="" placeholder="Ej: Adenocarcinoma..." oninput="sincronizarTextos()"></div>
            <div class="form-group"><label>Procedimiento:</label><input type="text" id="ui-procedimiento" value="CICLO DE MANTENIMIENTO" oninput="sincronizarTextos()"></div>
        </div>
        
        <h3 style="font-size: 14px; color: #0056b3; border-bottom: 1px solid #ddd; padding-bottom: 5px;">Costos en Ref. Dólares ($)</h3>
        <div class="form-grid" style="align-items: end;">
            <div class="form-group"><label>Concepto 1 (Admisión):</label><input type="text" value="SERVICIO DE ADMISION..." readonly style="background:#f5f5f5; color:#777; border:none;"></div>
            <div class="form-group" style="display:flex; gap:10px;">
                <div style="width:30%"><label>Cant:</label><input type="number" id="ui-cant-1" value="1" oninput="sincronizarTextos()"></div>
                <div style="width:70%"><label>Precio ($):</label><input type="number" id="ui-precio-1" value="450.00" step="0.01" oninput="sincronizarTextos()"></div>
            </div>
        </div>
        <div class="form-grid" style="align-items: end;">
            <div class="form-group"><label style="color:#dc3545;">Concepto 2 (Consumos - Línea azul):</label><input type="text" value="* CONSUMOS Y SERVICIOS..." readonly style="background:#f5f5f5; color:#777; border:none;"></div>
            <div class="form-group" style="display:flex; gap:10px;">
                <div style="width:30%"><label>Cant:</label><input type="number" id="ui-cant-2" value="1" oninput="sincronizarTextos()"></div>
                <div style="width:70%"><label>Precio ($):</label><input type="number" id="ui-precio-2" value="8595.00" step="0.01" oninput="sincronizarTextos()"></div>
            </div>
        </div>
        
        <!-- BOTONES LADO A LADO -->
        <div class="botones-container">
            <button class="btn-save" onclick="guardarDatos()">💾 Guardar Factura Actual</button>
            <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
        </div>
    </div>

    <!-- ÁREA DE LA FACTURA -->
    <div class="hoja-factura">
        <img id="bg-img" src="fondo_4.jpg" class="imagen-fondo-real" alt="Fondo" onerror="if(!this.src.includes('fondo.jpg')){this.src='fondo.jpg';}">
        
        <div class="texto-flotante" id="pos-paciente"></div>
        <div class="texto-flotante" id="pos-ci"></div>
        <div class="texto-flotante" id="pos-edad"></div>
        <div class="texto-flotante" id="pos-diagnostico"></div>
        <div class="texto-flotante" id="pos-procedimiento"></div>
        
        <div class="texto-flotante" id="pos-cant-1"></div>
        <div class="texto-flotante" id="pos-precio-1"></div>
        <div class="texto-flotante" id="pos-monto-1"></div>

        <div class="texto-flotante" id="pos-cant-2"></div>
        <div class="texto-flotante" id="pos-precio-2"></div>
        <div class="texto-flotante" id="pos-monto-2"></div>

        <div class="texto-flotante" id="pos-subtotal"></div>
        <div class="texto-flotante" id="pos-total"></div>
        <div class="texto-flotante" id="pos-fecha"></div>
    </div>

    <script>
        // Cargar imagen manual
        document.getElementById('imageLoader').addEventListener('change', function(e){
            var reader = new FileReader();
            reader.onload = function(event){
                document.getElementById('bg-img').src = event.target.result;
            }
            if(e.target.files[0]) {
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        function formatBs(n) { return 'Bs. ' + n.toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2}); }
        
        function sincronizarTextos() {
            const tasa = parseFloat(document.getElementById('ui-tasa').value) || 0;
            
            document.getElementById('pos-paciente').innerText = document.getElementById('ui-paciente').value;
            document.getElementById('pos-ci').innerText = document.getElementById('ui-ci').value;
            document.getElementById('pos-edad').innerText = document.getElementById('ui-edad').value;
            document.getElementById('pos-diagnostico').innerText = document.getElementById('ui-diagnostico').value;
            document.getElementById('pos-procedimiento').innerText = document.getElementById('ui-procedimiento').value;
            document.getElementById('pos-fecha').innerText = document.getElementById('ui-fecha').value;

            let totalBs = 0;

            // Fila 1
            const cant1 = parseInt(document.getElementById('ui-cant-1').value) || 0;
            const precioUSD1 = parseFloat(document.getElementById('ui-precio-1').value) || 0;
            if (cant1 > 0 && precioUSD1 > 0) {
                const montoBs1 = cant1 * precioUSD1 * tasa;
                totalBs += montoBs1;
                document.getElementById('pos-monto-1').innerText = formatBs(montoBs1);
            } else {
                document.getElementById('pos-monto-1').innerText = '';
            }

            // Fila 2
            const cant2 = parseInt(document.getElementById('ui-cant-2').value) || 0;
            const precioUSD2 = parseFloat(document.getElementById('ui-precio-2').value) || 0;
            if (cant2 > 0 && precioUSD2 > 0) {
                const montoBs2 = cant2 * precioUSD2 * tasa;
                totalBs += montoBs2;
                document.getElementById('pos-monto-2').innerText = formatBs(montoBs2);
            } else {
                document.getElementById('pos-monto-2').innerText = '';
            }

            document.getElementById('pos-subtotal').innerText = formatBs(totalBs);
            document.getElementById('pos-total').innerText = formatBs(totalBs);
        }

        // ==========================================
        // GESTIÓN DE PACIENTES FRECUENTES
        // ==========================================
        let listaPacientes = [];

        function cargarListaPacientes() {
            const pacientesGuardados = localStorage.getItem('listaPacientesDra');
            if (pacientesGuardados) {
                listaPacientes = JSON.parse(pacientesGuardados);
            }
            actualizarDropdown();
        }

        function actualizarDropdown() {
            const select = document.getElementById('ui-select-paciente');
            // Mantiene solo la primera opción por defecto
            select.innerHTML = '<option value="">-- Escribir nuevo o seleccionar paciente --</option>';
            
            // Agrega los pacientes guardados a la lista
            listaPacientes.forEach((p, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = p.nombre;
                select.appendChild(option);
            });
        }

        function seleccionarPaciente() {
            const index = document.getElementById('ui-select-paciente').value;
            if (index !== "") {
                const p = listaPacientes[index];
                document.getElementById('ui-paciente').value = p.nombre;
                document.getElementById('ui-ci').value = p.ci;
                document.getElementById('ui-edad').value = p.edad;
                
                // Actualiza visualmente la factura de inmediato
                sincronizarTextos();
            } else {
                // Si eligen la opción vacía, limpia los campos para uno nuevo
                document.getElementById('ui-paciente').value = "";
                document.getElementById('ui-ci').value = "";
                document.getElementById('ui-edad').value = "";
                sincronizarTextos();
            }
        }

        function guardarNuevoPaciente() {
            const nombre = document.getElementById('ui-paciente').value.trim();
            const ci = document.getElementById('ui-ci').value.trim();
            const edad = document.getElementById('ui-edad').value.trim();

            if (!nombre) {
                alert("⚠️ Debe escribir al menos el Nombre del paciente para poder guardarlo.");
                return;
            }

            // Verifica si el paciente ya existe en la lista (sin importar mayúsculas)
            const indexExistente = listaPacientes.findIndex(p => p.nombre.toLowerCase() === nombre.toLowerCase());
            
            if (indexExistente >= 0) {
                // Si ya existe, simplemente actualiza su cédula y edad
                listaPacientes[indexExistente] = { nombre, ci, edad };
                alert("✅ Paciente actualizado en la lista.");
            } else {
                // Si no existe, lo agrega al final de la lista
                listaPacientes.push({ nombre, ci, edad });
                alert("✅ Nuevo paciente guardado en la lista.");
            }

            // Guarda la nueva lista en la memoria del navegador
            localStorage.setItem('listaPacientesDra', JSON.stringify(listaPacientes));
            
            // Refresca el selector para mostrar el nuevo nombre
            actualizarDropdown();
            
            // Deja seleccionado al paciente recién guardado
            const select = document.getElementById('ui-select-paciente');
            select.value = indexExistente >= 0 ? indexExistente : listaPacientes.length - 1;
        }

        // ==========================================
        // FUNCIONES DE GUARDADO DE LA FACTURA
        // ==========================================
        function guardarDatos() {
            const datos = {
                tasa: document.getElementById('ui-tasa').value,
                fecha: document.getElementById('ui-fecha').value,
                paciente: document.getElementById('ui-paciente').value,
                ci: document.getElementById('ui-ci').value,
                edad: document.getElementById('ui-edad').value,
                diagnostico: document.getElementById('ui-diagnostico').value,
                procedimiento: document.getElementById('ui-procedimiento').value,
                cant1: document.getElementById('ui-cant-1').value,
                precio1: document.getElementById('ui-precio-1').value,
                cant2: document.getElementById('ui-cant-2').value,
                precio2: document.getElementById('ui-precio-2').value
            };
            
            localStorage.setItem('datosFacturaDra', JSON.stringify(datos));
            alert('✅ ¡Datos de la factura actual guardados exitosamente!');
        }

        function cargarDatos() {
            const datosGuardados = localStorage.getItem('datosFacturaDra');
            
            if (datosGuardados) {
                const datos = JSON.parse(datosGuardados);
                
                if(datos.tasa) document.getElementById('ui-tasa').value = datos.tasa;
                if(datos.fecha) document.getElementById('ui-fecha').value = datos.fecha;
                if(datos.paciente) document.getElementById('ui-paciente').value = datos.paciente;
                if(datos.ci) document.getElementById('ui-ci').value = datos.ci;
                if(datos.edad) document.getElementById('ui-edad').value = datos.edad;
                if(datos.diagnostico) document.getElementById('ui-diagnostico').value = datos.diagnostico;
                if(datos.procedimiento) document.getElementById('ui-procedimiento').value = datos.procedimiento;
                if(datos.cant1) document.getElementById('ui-cant-1').value = datos.cant1;
                if(datos.precio1) document.getElementById('ui-precio-1').value = datos.precio1;
                if(datos.cant2) document.getElementById('ui-cant-2').value = datos.cant2;
                if(datos.precio2) document.getElementById('ui-precio-2').value = datos.precio2;
            }
            sincronizarTextos();
        }
        
        // Al cargar la página, carga los pacientes, los datos anteriores y sincroniza la vista
        window.onload = function() {
            cargarListaPacientes();
            cargarDatos();
        };
    </script>
</body>
</html>
